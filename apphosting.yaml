# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  # Increase this value if you'd like to automatically spin up
  # more instances in response to increased traffic.
  maxInstances: 1
# Defines environment variables for the backend.
# These are NOT secure and should not be used for secrets.
# Use the Secret Manager for sensitive data like API keys.
# https://firebase.google.com/docs/app-hosting/configure-backend#set-secrets
env:
  - variable: SMTP_HOST
    value: "smtp.gmail.com"
  - variable: SMTP_PORT
    value: "587"
# Declares that the backend needs access to secrets stored in Secret Manager.
# You MUST create these secrets in the Google Cloud Secret Manager,
# which can be done through the Firebase App Hosting console UI.
# The app will NOT start if these secrets are not available.
secretEnv:
  - key: GEMINI_API_KEY
    secret: GEMINI_API_KEY
  - key: SMTP_USER
    secret: SMTP_USER
  - key: SMTP_PASS
    secret: SMTP_PASS
  - key: CONTACT_FORM_RECIPIENT
    secret: CONTACT_FORM_RECIPIENT
